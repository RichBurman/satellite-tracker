<app-navbar />

<h1>Satellite Dashboard</h1>

<app-search-bar (searchChanged)="onSearch($event)" />

@if (loading()) {
  <p>Loading satellites...</p>
}

@if (error()) {
  <p>
    {{ error() }}
  </p>
}

@if (!loading() && !error()) {
  <app-satellite-list [satellites]="filteredSatellites()"> </app-satellite-list>
}
